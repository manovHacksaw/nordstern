# ─── Production overrides for the pilot (single EC2 + RDS) ────────────────────────
# Layer on top of the base file:
#   docker compose -f docker-compose.platform.yml -f docker-compose.prod.yml --env-file .env up -d
#
# Changes vs dev: TLS via Let's Encrypt on Traefik; the two consoles served at
# register./admin.nordstern.live; every service on RDS (not the local Postgres container);
# provisioned anchors served over HTTPS under *.nordstern.live; and NO public dashboard/DB
# ports. Values marked ${...} come from the git-ignored .env (see .env.prod.example).

services:
  # Local Postgres is NOT used in prod — RDS is. Park it behind a profile so it doesn't start.
  db:
    profiles: ["localdb-disabled"]

  # LocalStack is dev-only. Prod uses REAL AWS Secrets Manager via the EC2 instance IAM role
  # (see platform-api/control-plane SECRETS_ENDPOINT="" below). Park it so it doesn't start.
  secrets:
    profiles: ["localstack-disabled"]

  # ── Traefik: HTTPS with Let's Encrypt; http→https redirect; no insecure dashboard ──
  traefik:
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=nordstern-net
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      # Redirect all http → https.
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      # ACME (Let's Encrypt) TLS-resolver "le" — matches ANCHOR_TRAEFIK_CERTRESOLVER=le.
      - --certificatesresolvers.le.acme.email=${ACME_EMAIL}
      - --certificatesresolvers.le.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.le.acme.tlschallenge=true
    ports: ["80:80", "443:443"]   # drop the public :8090 dashboard
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt:/letsencrypt

  # ── One-shot migrate → RDS ──
  platform-migrate:
    depends_on: !reset {}
    environment:
      DATABASE_URL: postgres://${DB_USER}:${DB_PASSWORD}@${RDS_HOST}:5432/platformdb

  # ── Platform API (prod) → RDS, HTTPS cookies, real domains, real Secrets Manager ──
  platform-api:
    depends_on: !reset
      platform-migrate: { condition: service_completed_successfully }
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://${DB_USER}:${DB_PASSWORD}@${RDS_HOST}:5432/platformdb
      COOKIE_SECURE: "true"
      APP_URL: https://register.nordstern.live
      CONSOLE_URL: https://register.nordstern.live
      ANCHOR_DOMAIN_SUFFIX: nordstern.live
      ANCHOR_PUBLIC_SCHEME: https
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      # Real AWS Secrets Manager via the EC2 instance role (empty endpoint + no static creds).
      SECRETS_ENDPOINT: ""
      AWS_ACCESS_KEY_ID: ""
      AWS_SECRET_ACCESS_KEY: ""
      AWS_REGION: ${AWS_REGION:-ap-south-1}
    ports: []   # not exposed publicly — reached only via Traefik / the compose network

  # ── Control plane (prod): provision anchors over HTTPS under *.nordstern.live ──
  control-plane:
    depends_on: !reset {}
    environment:
      DATABASE_URL: postgres://${DB_USER}:${DB_PASSWORD}@${RDS_HOST}:5432/controldb
      ANCHOR_DOMAIN_SUFFIX: nordstern.live
      ANCHOR_PUBLIC_SCHEME: https
      ANCHOR_TRAEFIK_ENTRYPOINT: websecure
      ANCHOR_TRAEFIK_CERTRESOLVER: le
      DIDIT_API_KEY: ${DIDIT_API_KEY}
      DIDIT_WORKFLOW_ID: ${DIDIT_WORKFLOW_ID}
      DIDIT_WEBHOOK_SECRET: ${DIDIT_WEBHOOK_SECRET}
      SECRETS_ENDPOINT: ""
      AWS_ACCESS_KEY_ID: ""
      AWS_SECRET_ACCESS_KEY: ""
      AWS_REGION: ${AWS_REGION:-ap-south-1}
    ports: []

  aggregator:
    depends_on: !reset {}
    environment:
      DATABASE_URL: postgres://${DB_USER}:${DB_PASSWORD}@${RDS_HOST}:5432/aggregatordb
    ports: []

  # ── Founder console → register.nordstern.live (HTTPS) ──
  founder-console:
    build:
      context: ./platform
      dockerfile: founder-console/Dockerfile
      args: { API_URL: http://platform-api:4000 }
    ports: []
    labels:
      - traefik.enable=true
      - traefik.http.routers.founder.rule=Host(`register.nordstern.live`)
      - traefik.http.routers.founder.entrypoints=websecure
      - traefik.http.routers.founder.tls.certresolver=le
      - traefik.http.services.founder.loadbalancer.server.port=3000

  # ── Admin console → admin.nordstern.live (HTTPS) ──
  admin-console:
    build:
      context: ./platform
      dockerfile: admin-console/Dockerfile
      args:
        API_URL: http://platform-api:4000
        NEXT_PUBLIC_FOUNDER_URL: https://register.nordstern.live
    ports: []
    labels:
      - traefik.enable=true
      - traefik.http.routers.admin.rule=Host(`admin.nordstern.live`)
      - traefik.http.routers.admin.entrypoints=websecure
      - traefik.http.routers.admin.tls.certresolver=le
      - traefik.http.services.admin.loadbalancer.server.port=3000

volumes:
  letsencrypt:
