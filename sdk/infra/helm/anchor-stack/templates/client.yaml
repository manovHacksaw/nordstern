# Operator console (Next.js). Reads the business-server admin API via its /biz proxy.
# No app-level auth by design (KNOWN_ISSUES) — access control is at the ingress layer
# (private/SSO). Do NOT expose this host publicly without that.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: client
  namespace: {{ include "anchor.namespace" . }}
  labels:
    {{- include "anchor.labels" . | nindent 4 }}
    app: client
spec:
  replicas: 1
  selector:
    matchLabels: { app: client }
  template:
    metadata:
      labels:
        app: client
        {{- include "anchor.labels" . | nindent 8 }}
    spec:
      securityContext: { runAsNonRoot: true, seccompProfile: { type: RuntimeDefault } }
      containers:
        - name: client
          image: {{ include "anchor.image.client" . }}
          ports:
            - { name: http, containerPort: 3001 }
          env:
            - name: BIZ_INTERNAL_URL
              value: "http://business-server:3000"
          readinessProbe:
            httpGet: { path: /, port: 3001 }
            initialDelaySeconds: 8
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
          resources: {{ toYaml .Values.resources.client | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: client
  namespace: {{ include "anchor.namespace" . }}
  labels: { app: client }
spec:
  selector: { app: client }
  ports:
    - { name: http, port: 3001, targetPort: 3001 }
