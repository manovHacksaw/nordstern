{{- if .Values.externalSecrets.enabled }}
# Syncs the anchor's OWN rails (treasury seed, Razorpay/Cashfree/DIDIT keys) + the
# RDS-managed DB credential from AWS Secrets Manager into one k8s Secret that the
# workloads consume via envFrom. Model A (DEC Q1): NordStern holds the keys encrypted
# and orchestrates; the values never live in this chart or in git.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: anchor-secrets
  namespace: {{ include "anchor.namespace" . }}
  labels:
    {{- include "anchor.labels" . | nindent 4 }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStore }}
    kind: ClusterSecretStore
  target:
    name: anchor-secrets
    creationPolicy: Owner
  dataFrom:
    # The whole per-anchor secret is a flat map of env keys (TREASURY_SECRET,
    # DIDIT_API_KEY, RAZORPAY_KEY_SECRET, CASHFREE_SECRET, DATABASE_URL, …).
    - extract:
        key: {{ .Values.externalSecrets.anchorSecretName }}
{{- end }}
