# business-server — our callbacks, SEP-24 interactive UI, Stellar ops, the idempotent
# deposit outbox + withdrawal payout guard. Stateless → HPA-scaled.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: business-server
  namespace: {{ include "anchor.namespace" . }}
  labels:
    {{- include "anchor.labels" . | nindent 4 }}
    app: business-server
spec:
  {{- if not .Values.autoscaling.businessServer.enabled }}
  replicas: 2
  {{- end }}
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxUnavailable: 0, maxSurge: 1 }   # never dip below capacity
  selector:
    matchLabels: { app: business-server }
  template:
    metadata:
      labels:
        app: business-server
        {{- include "anchor.labels" . | nindent 8 }}
    spec:
      {{- if or .Values.serviceAccount.create .Values.serviceAccount.name }}
      serviceAccountName: {{ .Values.serviceAccount.name | default "business-server" }}
      {{- end }}
      securityContext: { runAsNonRoot: true, seccompProfile: { type: RuntimeDefault } }
      containers:
        - name: business-server
          image: {{ include "anchor.image.businessServer" . }}
          ports:
            - { name: http, containerPort: 3000 }
          envFrom:
            - configMapRef: { name: business-server-env }   # non-secret
            - secretRef:    { name: anchor-secrets }         # treasury seed, PSP keys, DATABASE_URL, …
          readinessProbe:
            httpGet: { path: /health, port: 3000 }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /health, port: 3000 }
            initialDelaySeconds: 15
            periodSeconds: 15
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
          resources: {{ toYaml .Values.resources.businessServer | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: business-server
  namespace: {{ include "anchor.namespace" . }}
  labels: { app: business-server }
spec:
  selector: { app: business-server }
  ports:
    - { name: http, port: 3000, targetPort: 3000 }
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: business-server
  namespace: {{ include "anchor.namespace" . }}
spec:
  minAvailable: 1
  selector:
    matchLabels: { app: business-server }
{{- if .Values.autoscaling.businessServer.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: business-server
  namespace: {{ include "anchor.namespace" . }}
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: business-server }
  minReplicas: {{ .Values.autoscaling.businessServer.minReplicas }}
  maxReplicas: {{ .Values.autoscaling.businessServer.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: {{ .Values.autoscaling.businessServer.targetCPU }} }
{{- end }}
