name: Database

# Schema-management validation (R6 M2-c → hardened in M4). Validates platform/api's
# Drizzle migrations: they must be consistent, they must actually APPLY to a real
# Postgres, and schema.ts must not drift ahead of them. Raw-SQL services are brought
# under migrations in later M4 increments. Does not modify ci.yml.

on:
  pull_request:
    paths:
      - 'platform/api/**'
      - '.github/workflows/db.yml'
  push:
    branches: [main]
    paths:
      - 'platform/api/**'
      - '.github/workflows/db.yml'

concurrency:
  group: db-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  drizzle-migrations:
    name: drizzle-migrations
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: pw
          POSTGRES_DB: nordstern_platform
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup + install
        uses: ./.github/actions/setup
        with:
          workspace: platform/api

      # BLOCKING: committed migrations must be internally consistent.
      - name: Migration consistency (drizzle-kit check)
        working-directory: platform/api
        run: npx drizzle-kit check < /dev/null

      # BLOCKING: the full chain must actually apply to a fresh database.
      - name: Migrations apply cleanly
        working-directory: platform/api
        env:
          DATABASE_URL: postgres://postgres:pw@localhost:5432/nordstern_platform
        run: npm run db:migrate

      # BLOCKING (M4): schema.ts must not be ahead of the committed migrations.
      # generate exits 0 even on a conflict, so we classify its output.
      - name: No schema drift
        working-directory: platform/api
        run: |
          set +e
          OUT="$(npx drizzle-kit generate < /dev/null 2>&1)"
          echo "$OUT"
          # Discard anything generate may have written — this job validates, never commits.
          git checkout -- drizzle/ 2>/dev/null || true
          git clean -fdq drizzle/ 2>/dev/null || true
          if echo "$OUT" | grep -qiE "No schema changes"; then
            echo "✅ No schema drift."
            exit 0
          fi
          echo "::error title=Schema drift::src/db/schema.ts is ahead of the committed migrations."
          echo "Run 'npm run db:generate' in platform/api and commit the new drizzle/ files."
          exit 1
