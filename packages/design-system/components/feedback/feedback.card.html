<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: var(--color-bg-canvas); padding: 28px; font-family: var(--font-body); }
  .cols { display: grid; grid-template-columns: 1.2fr 1fr; gap: 24px; align-items: start; }
  .stack { display: flex; flex-direction: column; gap: 12px; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { Alert, Button } = window.PhantomDesignSystem_a666e0;
  const Check = () => (<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>);
  const Warn = () => (<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 9v4M12 17h.01"/><path d="M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z"/></svg>);
  ReactDOM.createRoot(document.getElementById("root")).render(
    <div className="cols">
      <div className="stack">
        <Alert tone="success" title="Sent" icon={<Check/>} onClose={()=>{}}>Your transfer is on its way.</Alert>
        <Alert tone="error" title="Transfer failed" icon={<Warn/>}>Insufficient balance — add funds and retry.</Alert>
      </div>
      <div style={{ background: "var(--color-bg-canvas)", border: "1px solid var(--color-border)", borderRadius: "var(--radius-md)", boxShadow: "var(--shadow-lg)", padding: 24 }}>
        <h3 style={{ margin: "0 0 6px", fontFamily: "var(--font-display)", fontWeight: 600, fontSize: 20, color: "var(--color-text-primary)" }}>Connect a wallet</h3>
        <p style={{ margin: "0 0 16px", fontFamily: "var(--font-body)", fontSize: 14, color: "var(--color-text-secondary)" }}>Choose how you'd like to continue.</p>
        <Button fullWidth>Continue</Button>
      </div>
    </div>
  );
</script>
</body>
</html>
