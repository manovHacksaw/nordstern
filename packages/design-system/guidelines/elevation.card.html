<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: #FFFFFF; padding: 32px; font-family: var(--font-body); }
  .row { display: flex; gap: 32px; align-items: center; }
  .item { text-align: center; }
  .box { width: 110px; height: 70px; background: #FFFFFF; border-radius: var(--radius-lg); }
  .lbl { font-family: var(--font-display); font-weight: 600; font-size: 13px; color: #1A1A1A; margin-top: 16px; }
</style>
</head>
<body>
<div class="row">
  <div class="item"><div class="box" style="box-shadow:var(--shadow-sm)"></div><div class="lbl">shadow-sm</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-md)"></div><div class="lbl">shadow-md</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-lg)"></div><div class="lbl">shadow-lg</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-glow)"></div><div class="lbl">glow (focus)</div></div>
</div>
</body>
</html>
