<!-- @dsCard group="Type" viewport="700x230" name="Body & UI" subtitle="Inter — lead, body, helper, label" -->
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--color-bg-canvas); padding: 28px; font-family: var(--font-body); color: var(--color-text-primary); }
  .row { display: flex; align-items: baseline; gap: 16px; margin-bottom: 14px; }
  .tag { font-family: var(--font-mono); font-size: 11px; color: var(--color-text-secondary); width: 96px; flex-shrink: 0; }
  .blg { font-size: var(--font-body-lg); line-height: var(--lh-body-lg); }
  .bmd { font-size: var(--font-body-md); line-height: var(--lh-body-md); }
  .bsm { font-size: var(--font-body-sm); line-height: var(--lh-body-sm); color: var(--color-text-secondary); }
  .lbl { font-size: var(--font-label); line-height: var(--lh-label); font-weight: 600; font-family: var(--font-display); }
</style>
</head>
<body>
  <div class="row"><span class="tag">body-lg · 17</span><span class="blg">A friendly wallet that makes crypto feel approachable.</span></div>
  <div class="row"><span class="tag">body-md · 15</span><span class="bmd">Default body text for descriptions and content blocks.</span></div>
  <div class="row"><span class="tag">body-sm · 13</span><span class="bsm">Helper text and captions sit in the secondary color.</span></div>
  <div class="row"><span class="tag">label · 14/600</span><span class="lbl">Buttons · Form labels · Nav</span></div>
</body>
</html>
