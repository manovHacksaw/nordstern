<!-- @dsCard group="Type" viewport="700x180" name="Mono / numeric" subtitle="JetBrains Mono — balances, addresses, %" -->
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--color-bg-canvas); padding: 28px; font-family: var(--font-mono); color: var(--color-text-primary); }
  .row { display: flex; align-items: baseline; gap: 16px; margin-bottom: 14px; }
  .tag { font-size: 11px; color: var(--color-text-secondary); width: 96px; flex-shrink: 0; }
  .big { font-size: 32px; font-weight: 500; }
  .md { font-size: var(--font-mono-md); }
  .addr { font-size: 14px; color: var(--color-text-secondary); }
</style>
</head>
<body>
  <div class="row"><span class="tag">balance</span><span class="big">$12,480.22</span></div>
  <div class="row"><span class="tag">mono-md · 15</span><span class="md">12.4002 SOL · <span style="color:var(--color-success)">+2.41%</span></span></div>
  <div class="row"><span class="tag">address</span><span class="addr">7xKXtg2…aB91f3 · 2:14 PM</span></div>
</body>
</html>
