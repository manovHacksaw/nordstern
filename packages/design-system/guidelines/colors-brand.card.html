<!-- @dsCard group="Colors" viewport="700x150" name="Brand palette" subtitle="Perano purple family — 50 → 900" -->
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--color-bg-canvas); padding: 24px; font-family: var(--font-body); }
  .swatches { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; }
  .sw { border-radius: var(--radius-md); overflow: hidden; border: 1px solid var(--color-border); }
  .chip { height: 64px; }
  .meta { padding: 8px 10px; background: var(--color-bg-surface); }
  .name { font-family: var(--font-display); font-weight: 600; font-size: 13px; color: var(--color-text-primary); }
  .hex { font-family: var(--font-mono); font-size: 11px; color: var(--color-text-secondary); margin-top: 2px; }
</style>
</head>
<body>
<div class="swatches">
  <div class="sw"><div class="chip" style="background:var(--color-brand-50)"></div><div class="meta"><div class="name">50</div><div class="hex">#F5F2FF</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--color-brand-100)"></div><div class="meta"><div class="name">100</div><div class="hex">#E2DFFE</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--color-brand-300)"></div><div class="meta"><div class="name">300</div><div class="hex">#C7BEF7</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--color-brand-500)"></div><div class="meta"><div class="name">500 ★</div><div class="hex">#AB9FF2</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--color-brand-700)"></div><div class="meta"><div class="name">700</div><div class="hex">#8B7EE0</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--color-brand-900)"></div><div class="meta"><div class="name">900</div><div class="hex">#3C315B</div></div></div>
</div>
</body>
</html>
