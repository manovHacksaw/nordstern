<!-- @dsCard group="Spacing" viewport="700x170" name="Radius scale" subtitle="8 → 16 → 24 → 32 → full (16px brand default)" -->
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--color-bg-canvas); padding: 28px; font-family: var(--font-body); }
  .row { display: flex; gap: 20px; align-items: flex-end; }
  .item { text-align: center; }
  .box { width: 80px; height: 80px; background: var(--color-bg-surface-2); border: 1.5px solid var(--color-brand-500); }
  .lbl { font-family: var(--font-display); font-weight: 600; font-size: 13px; color: var(--color-text-primary); margin-top: 10px; }
  .val { font-family: var(--font-mono); font-size: 11px; color: var(--color-text-secondary); }
</style>
</head>
<body>
<div class="row">
  <div class="item"><div class="box" style="border-radius:var(--radius-sm)"></div><div class="lbl">sm</div><div class="val">8px</div></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-md)"></div><div class="lbl">md ★</div><div class="val">16px</div></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-lg)"></div><div class="lbl">lg</div><div class="val">24px</div></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-xl)"></div><div class="lbl">xl</div><div class="val">32px</div></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-full)"></div><div class="lbl">full</div><div class="val">999px</div></div>
</div>
</body>
</html>
