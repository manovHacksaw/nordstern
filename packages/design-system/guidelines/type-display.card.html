<!-- @dsCard group="Type" viewport="700x260" name="Display & headings" subtitle="General Sans, 600, tight tracking" -->
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--color-bg-canvas); padding: 28px; font-family: var(--font-display); color: var(--color-text-primary); }
  .row { display: flex; align-items: baseline; gap: 16px; margin-bottom: 14px; }
  .tag { font-family: var(--font-mono); font-size: 11px; color: var(--color-text-secondary); width: 88px; flex-shrink: 0; }
  .d-xl { font-size: var(--font-display-xl); line-height: var(--lh-display-xl); font-weight: 600; letter-spacing: -0.02em; }
  .d-lg { font-size: var(--font-display-lg); line-height: var(--lh-display-lg); font-weight: 600; letter-spacing: -0.02em; }
  .h1 { font-size: var(--font-h1); line-height: var(--lh-h1); font-weight: 600; letter-spacing: -0.02em; }
  .h2 { font-size: var(--font-h2); line-height: var(--lh-h2); font-weight: 600; }
  .h3 { font-size: var(--font-h3); line-height: var(--lh-h3); font-weight: 600; }
</style>
</head>
<body>
  <div class="row"><span class="tag">display-xl</span><span class="d-xl">Your crypto home</span></div>
  <div class="row"><span class="tag">display-lg</span><span class="d-lg">Send money, simply</span></div>
  <div class="row"><span class="tag">h1 · 36</span><span class="h1">Page title</span></div>
  <div class="row"><span class="tag">h2 · 28</span><span class="h2">Section title</span></div>
  <div class="row"><span class="tag">h3 · 22</span><span class="h3">Card / group title</span></div>
</body>
</html>
