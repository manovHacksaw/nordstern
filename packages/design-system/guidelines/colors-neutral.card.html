<!-- @dsCard group="Colors" viewport="700x160" name="Dark theme neutrals" subtitle="Product surfaces, text & borders" -->
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--color-bg-canvas); padding: 24px; font-family: var(--font-body); }
  .swatches { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
  .sw { border-radius: var(--radius-md); overflow: hidden; border: 1px solid var(--color-border); }
  .chip { height: 56px; display:flex; align-items:center; justify-content:center; }
  .meta { padding: 8px 10px; background: var(--color-bg-surface); }
  .name { font-family: var(--font-display); font-weight: 600; font-size: 12px; color: var(--color-text-primary); }
  .hex { font-family: var(--font-mono); font-size: 10px; color: var(--color-text-secondary); margin-top: 2px; }
</style>
</head>
<body>
<div class="swatches">
  <div class="sw"><div class="chip" style="background:#1A1A1A"></div><div class="meta"><div class="name">canvas</div><div class="hex">#1A1A1A</div></div></div>
  <div class="sw"><div class="chip" style="background:#211F29"></div><div class="meta"><div class="name">surface</div><div class="hex">#211F29</div></div></div>
  <div class="sw"><div class="chip" style="background:#2A2733"></div><div class="meta"><div class="name">surface-2</div><div class="hex">#2A2733</div></div></div>
  <div class="sw"><div class="chip" style="background:#98979C"></div><div class="meta"><div class="name">text-2</div><div class="hex">#98979C</div></div></div>
  <div class="sw"><div class="chip" style="background:#FFFFFF"></div><div class="meta"><div class="name">text</div><div class="hex">#FFFFFF</div></div></div>
</div>
</body>
</html>
