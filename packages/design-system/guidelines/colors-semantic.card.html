<!-- @dsCard group="Colors" viewport="700x160" name="Semantic colors" subtitle="Success · warning · error · info, solid + 16% fill" -->
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--color-bg-canvas); padding: 24px; font-family: var(--font-body); }
  .swatches { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  .sw { border-radius: var(--radius-md); overflow: hidden; border: 1px solid var(--color-border); }
  .solid { height: 44px; }
  .fill { height: 24px; }
  .meta { padding: 8px 10px; background: var(--color-bg-surface); }
  .name { font-family: var(--font-display); font-weight: 600; font-size: 13px; color: var(--color-text-primary); }
  .hex { font-family: var(--font-mono); font-size: 11px; color: var(--color-text-secondary); margin-top: 2px; }
</style>
</head>
<body>
<div class="swatches">
  <div class="sw"><div class="solid" style="background:var(--color-success)"></div><div class="fill" style="background:var(--color-success-fill)"></div><div class="meta"><div class="name">Success</div><div class="hex">#2EC08B</div></div></div>
  <div class="sw"><div class="solid" style="background:var(--color-warning)"></div><div class="fill" style="background:var(--color-warning-fill)"></div><div class="meta"><div class="name">Warning</div><div class="hex">#F2B84B</div></div></div>
  <div class="sw"><div class="solid" style="background:var(--color-error)"></div><div class="fill" style="background:var(--color-error-fill)"></div><div class="meta"><div class="name">Error</div><div class="hex">#FF4444</div></div></div>
  <div class="sw"><div class="solid" style="background:var(--color-info)"></div><div class="fill" style="background:var(--color-info-fill)"></div><div class="meta"><div class="name">Info</div><div class="hex">#7DB8F2</div></div></div>
</div>
</body>
</html>
