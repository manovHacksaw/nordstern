# NordStern anchor factory — BASE stack (DL-005/DL-006).
# This file runs only the shared infra. The per-anchor Anchor Platform +
# business-server containers are created DYNAMICALLY by the control-plane
# orchestrator (dockerode) and joined to the `nordstern-net` network below.

services:

  # ─── PostgreSQL ─────────────────────────────────────────────────────────────
  # Hosts controldb (control plane) + one anchordb_<slug> per provisioned anchor.
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: anchor
      POSTGRES_PASSWORD: anchor
      POSTGRES_DB: anchordb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/pg-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U anchor -d anchordb"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─── Traefik (reverse proxy) ────────────────────────────────────────────────
  # Routes <slug>.anchors.localhost → that anchor's AP (default) and the
  # /sep24/interactive path → that anchor's business-server (higher priority).
  # Discovers dynamic containers via Docker labels the orchestrator sets.
  traefik:
    image: traefik:v3.0
    restart: unless-stopped
    command:
      - --providers.docker=true
      - --providers.docker.exposedByDefault=false
      - --providers.docker.network=nordstern-net
      - --entrypoints.web.address=:80
      - --api.insecure=true
    ports:
      - "80:80"
      - "8090:8080"   # Traefik dashboard (dev only)
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

  # ─── Control Plane (the factory / orchestrator) ─────────────────────────────
  # Provisions anchors: generates keys/asset/config and spins up per-anchor
  # containers via the Docker Engine API. Needs the Docker socket + a shared
  # host config dir (see ANCHOR_CONFIG_HOST_ROOT).
  control-plane:
    build: ./control-plane
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3002:3002"
    environment:
      PORT: 3002
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: controldb
      DB_USER: anchor
      DB_PASSWORD: anchor
      JWT_SECRET: ${CP_JWT_SECRET:-change-me-in-production}
      MASTER_KEK: ${MASTER_KEK:?MASTER_KEK is required — run scripts/setup-base.mjs}
      DOCKER_NETWORK: nordstern-net
      AP_IMAGE: stellar/anchor-platform:latest
      BIZ_IMAGE: nordstern/business-server:dev
      ANCHOR_CONFIG_DIR: /anchor-configs
      ANCHOR_CONFIG_HOST_ROOT: ${ANCHOR_CONFIG_HOST_ROOT:?run scripts/setup-base.mjs}
      ANCHOR_DOMAIN_SUFFIX: anchors.localhost
      HORIZON_URL: https://horizon-testnet.stellar.org
      NETWORK_PASSPHRASE: "Test SDF Network ; September 2015"
      SUREPASS_BASE_URL: ${SUREPASS_BASE_URL:-https://sandbox.surepass.io}
      SUREPASS_TOKEN: ${SUREPASS_TOKEN:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${ANCHOR_CONFIG_HOST_ROOT}:/anchor-configs

  # ─── Frontend (Next.js) ─────────────────────────────────────────────────────
  # Operator management panel + wallet. Talks to the control plane via /cp/*.
  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - control-plane
    ports:
      - "3001:3001"
    environment:
      CP_URL: http://control-plane:3002

volumes:
  pgdata:

networks:
  default:
    name: nordstern-net
